<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6TMT2 報名名單 - Admin</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #050509;
        color: #f5f5f5;
      }

      header {
        padding: 16px 24px;
        background: linear-gradient(to right, #11111a, #1b1724);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      main {
        padding: 16px 24px 32px;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      input[type='password'] {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(10, 10, 20, 0.9);
        color: #f5f5f5;
      }

      button {
        padding: 6px 12px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        background: #ff66aa;
        color: #111;
        font-weight: 600;
        font-size: 14px;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .editor {
        margin-bottom: 16px;
        padding: 10px 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .editor h2 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .editor-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .editor-row input[type='number'],
      .editor-row input[type='text'] {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(10, 10, 20, 0.9);
        color: #f5f5f5;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        font-size: 14px;
      }

      th,
      td {
        padding: 8px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        text-align: left;
        white-space: nowrap;
      }

      th {
        background: rgba(255, 255, 255, 0.03);
        font-weight: 600;
      }

      tbody tr:nth-child(even) {
        background: rgba(255, 255, 255, 0.02);
      }

      .status {
        margin-left: 8px;
        font-size: 12px;
        color: #ccc;
      }

      .empty {
        margin-top: 16px;
        font-size: 14px;
        color: #bbb;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>6TMT2 報名名單 - Admin</h1>
    </header>
    <main>
      <div class="toolbar">
        <label>
          Admin Token：
          <input type="password" id="token" placeholder="如未設定可留空" />
        </label>
        <button id="load">重新載入</button>
        <span class="status" id="status"></span>
      </div>

      <section class="editor">
        <h2>新增 / 更新玩家</h2>
        <div class="editor-row">
          <input type="number" id="new-id" placeholder="osu! user id" />
          <input type="text" id="new-username" placeholder="username" />
          <button id="add">新增 / 更新</button>
        </div>
      </section>

      <div id="table-container"></div>
    </main>

    <script>
      const tokenInput = document.getElementById('token');
      const loadBtn = document.getElementById('load');
      const statusEl = document.getElementById('status');
      const tableContainer = document.getElementById('table-container');
      const newIdInput = document.getElementById('new-id');
      const newUsernameInput = document.getElementById('new-username');
      const addBtn = document.getElementById('add');

      function buildHeaders(isJson) {
        const headers = {};
        if (isJson) {
          headers['Content-Type'] = 'application/json';
        }
        const token = tokenInput.value.trim();
        if (token) {
          headers['Authorization'] = 'Bearer ' + token;
        }
        return headers;
      }

      async function loadParticipants() {
        loadBtn.disabled = true;
        statusEl.textContent = '載入中...';

        try {
          const res = await fetch('/api/admin/participants', { headers: buildHeaders(false) });

          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || 'HTTP ' + res.status);
          }

          const data = await res.json();
          renderTable(data);
          statusEl.textContent = `共 ${data.length} 位報名玩家`;
        } catch (err) {
          console.error(err);
          statusEl.textContent = '載入失敗：' + err.message;
          tableContainer.innerHTML = '';
        } finally {
          loadBtn.disabled = false;
        }
      }

      function renderTable(list) {
        if (!list || list.length === 0) {
          tableContainer.innerHTML = '<p class="empty">目前尚無報名資料。</p>';
          return;
        }

        const rows = list
          .map((p) => {
            const time = p.registered_at ? new Date(p.registered_at).toLocaleString() : '';
            return `<tr>
              <td>${p.osu_user_id}</td>
              <td>${p.username}</td>
              <td>${time}</td>
              <td><button class="delete-btn" data-id="${p.osu_user_id}">刪除</button></td>
            </tr>`;
          })
          .join('');

        tableContainer.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>osu! user id</th>
                <th>username</th>
                <th>registered at</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;

        tableContainer.querySelectorAll('.delete-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            const id = btn.getAttribute('data-id');
            if (!id) return;
            if (!confirm(`確定要刪除玩家 ${id} 嗎？`)) return;
            deleteParticipant(id);
          });
        });
      }

      async function addParticipant() {
        const id = newIdInput.value.trim();
        const username = newUsernameInput.value.trim();

        if (!id || !username) {
          alert('請輸入完整的 osu! user id 與 username');
          return;
        }

        addBtn.disabled = true;
        statusEl.textContent = '送出中...';

        try {
          const res = await fetch('/api/admin/participants', {
            method: 'POST',
            headers: buildHeaders(true),
            body: JSON.stringify({ osu_user_id: id, username })
          });

          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || 'HTTP ' + res.status);
          }

          newIdInput.value = '';
          newUsernameInput.value = '';
          statusEl.textContent = '已新增/更新玩家';
          loadParticipants();
        } catch (err) {
          console.error(err);
          statusEl.textContent = '新增/更新失敗：' + err.message;
        } finally {
          addBtn.disabled = false;
        }
      }

      async function deleteParticipant(id) {
        statusEl.textContent = `刪除中：${id}...`;

        try {
          const res = await fetch('/api/admin/participants/' + encodeURIComponent(id), {
            method: 'DELETE',
            headers: buildHeaders(false)
          });

          if (!res.ok && res.status !== 204) {
            const text = await res.text();
            throw new Error(text || 'HTTP ' + res.status);
          }

          statusEl.textContent = '已刪除玩家 ' + id;
          loadParticipants();
        } catch (err) {
          console.error(err);
          statusEl.textContent = '刪除失敗：' + err.message;
        }
      }

      loadBtn.addEventListener('click', loadParticipants);
      addBtn.addEventListener('click', addParticipant);
      window.addEventListener('load', loadParticipants);
    </script>
  </body>
</html>
