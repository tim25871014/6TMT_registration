<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6TMT2 報名頁面</title>
    <style>
      html {
        min-height: 100vh;
        background: linear-gradient(-60deg, #1a264c 0%, #111 50%, #480508 100%);
      }
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: transparent;
        color: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: rgba(10, 10, 15, 0.92);
        border-radius: 18px;
        padding: 20px 20px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.7);
        max-width: 420px;
        width: 100%;
        margin: 20px;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 26px;
      }

      p {
        margin: 4px 0 16px;
        line-height: 1.5;
        font-size: 14px;
        color: #d0d0d0;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #2b2f3a, #444a5a);
        color: #f5f5f5;
        font-weight: 600;
        font-size: 15px;
        text-decoration: none;
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.55);
        transition: transform 0.12s ease-out, box-shadow 0.12s ease-out, filter 0.12s ease-out;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
        filter: brightness(1.05);
      }

      .button:active {
        transform: translateY(0);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        filter: brightness(0.98);
      }

      .hint {
        font-size: 12px;
        color: #9a9a9a;
        margin-top: 10px;
      }
      .field {
        margin: 10px 0 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 14px;
      }
      .field label {
        color: #e0e0e0;
      }
      .field input {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(8, 8, 12, 0.9);
        color: #f5f5f5;
        font-size: 14px;
      }
      .field input:focus {
        outline: none;
        border-color: #ff66aa;
      }
      #register-btn.button {
        background: linear-gradient(135deg, #ff66aa, #ffcc66);
        color: #1a1a1a;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 20;
      }
      .modal-backdrop.show {
        display: flex;
      }
      .modal {
        width: min(100%, 420px);
        background: rgba(15, 15, 22, 0.98);
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.75);
        padding: 20px;
      }
      .modal h2 {
        margin: 0 0 10px;
        font-size: 20px;
      }
      .modal p {
        margin-bottom: 18px;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .modal-actions .button.secondary {
        background: linear-gradient(135deg, #ff66aa, #ffcc66);
        color: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>6TMT2 報名系統</h1>
      <p>
        點擊下方按鈕後，系統會帶你前往 osu! 官方授權頁面。
        授權完成後，我們會取得你的 osu! 帳號資訊並完成報名。
      </p>
      <div class="field">
        <label for="discord">Discord ID（必填，例如：@luke920118）</label>
        <input id="discord" type="text" placeholder="請輸入你的 Discord ID" />
      </div>
      <button class="button" id="register-btn" type="button">使用 osu! 帳號報名</button>
      <p class="hint">我們會儲存你的 osu! user id、username、全球排名與 Discord ID，用於本比賽用途。</p>
    </main>
    <div class="modal-backdrop" id="discord-modal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="discord-modal-title">
        <h2 id="discord-modal-title">報名前提醒</h2>
        <p>所有賽事通知皆會在 6TMT2 的 Discord server 發布，請先確認你已經加入，再繼續報名。</p>
        <div class="modal-actions">
          <a class="button secondary" id="join-discord-btn" href="https://discord.gg/7nyKP3ra69" target="_blank" rel="noopener noreferrer">加入Discord伺服器</a>
          <button class="button" id="already-joined-btn" type="button">已經加入了</button>
        </div>
      </div>
    </div>
    <script>
      const discordInput = document.getElementById('discord');
      const registerBtn = document.getElementById('register-btn');
      const discordModal = document.getElementById('discord-modal');
      const alreadyJoinedBtn = document.getElementById('already-joined-btn');
      const joinDiscordBtn = document.getElementById('join-discord-btn');

      function openDiscordModal() {
        discordModal.classList.add('show');
        discordModal.setAttribute('aria-hidden', 'false');
        alreadyJoinedBtn.focus();
      }

      function closeDiscordModal() {
        discordModal.classList.remove('show');
        discordModal.setAttribute('aria-hidden', 'true');
      }

      function startOsuAuth() {
        let discord = discordInput.value.trim();
        if (!discord) {
          alert('請先填寫你的 Discord ID');
          discordInput.focus();
          return;
        }
        // 自動加上 @ 符號（如果沒有的話）
        if (!discord.startsWith('@')) {
          discord = '@' + discord;
        }
        const url = '/auth/osu?discord_id=' + encodeURIComponent(discord);
        window.location.href = url;
      }

      registerBtn.addEventListener('click', () => {
        if (!discordInput.value.trim()) {
          alert('請先填寫你的 Discord ID');
          discordInput.focus();
          return;
        }
        openDiscordModal();
      });

      alreadyJoinedBtn.addEventListener('click', () => {
        closeDiscordModal();
        startOsuAuth();
      });

      joinDiscordBtn.addEventListener('click', () => {
        closeDiscordModal();
      });

      discordModal.addEventListener('click', (event) => {
        if (event.target === discordModal) {
          closeDiscordModal();
        }
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && discordModal.classList.contains('show')) {
          closeDiscordModal();
        }
      });
    </script>
  </body>
</html>
