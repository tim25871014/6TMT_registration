<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6TMT2 比賽首頁</title>
    <style>
          @font-face {
            font-family: 'ErasBoldITC';
            src: local('Eras Bold ITC'), local('ErasBoldITC'), url('/fonts/ErasBoldITC.woff2') format('woff2'), url('/fonts/ErasBoldITC.woff') format('woff');
            font-weight: bold;
            font-style: normal;
          }
      html {
        min-height: 100vh;
        background: linear-gradient(-60deg, #1a264c 0%, #111 50%, #480508 100%);
      }
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: transparent;
        color: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .shell {
        width: 100%;
        padding: 32px 20px;
        display: flex;
        justify-content: center;
      }

      .hero {
        background: rgba(10, 10, 18, 0.88);
        border-radius: 20px;
        padding: 24px 22px 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.75);
        width: auto;
        width: auto;
        margin: 0 auto;
      }

      @media (min-width: 720px) {
        .hero {
          width: 80%;
        }
      }

      @media (min-width: 1080px) {
        .hero {
          width: 70%;
        }
      }

      .hero-header {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 14px;
      }

      .title-block h1 {
        margin: 0;
        font-size: 30px;
        letter-spacing: 1px;
      }
      .title-block h1 img {
        margin-top: 20px;
        max-width: 100%;
        object-fit: contain;
        display: block;
        margin: 0 auto;
      }
      .eras {
        font-family: 'ErasBoldITC', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: bold;
        letter-spacing: 1px;
        font-size: 70px;
      }

      .title-block p {
        margin: 6px 0 0;
        font-size: 13px;
        color: #c9c9d9;
      }

      .primary-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
        justify-content: center;
      }

      .primary-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: clamp(8px, 2vw, 14px) clamp(16px, 5vw, 28px);
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: clamp(14px, 3vw, 18px);
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.12s, box-shadow 0.12s, filter 0.12s, font-size 0.18s, padding 0.18s;
      }

      .primary-btn--register {
        background: linear-gradient(135deg, #ff66aa, #ffcc66);
        color: #1a1a1a;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.65);
      }

      .primary-btn--list {
        background: rgba(255, 255, 255, 0.08);
        color: #f5f5f5;
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .primary-btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.04);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.8);
      }

      .primary-btn:active {
        transform: translateY(0);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
        filter: brightness(0.97);
      }

      .hero-main {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 12px;
      }

      .section-title {
        font-size: 14px;
        font-weight: 600;
        color: #ffcc88;
        margin-bottom: 6px;
      }

      .info-list {
        margin: 0;
        padding-left: 18px;
        font-size: 13px;
        color: #dedede;
      }

      .info-list li + li {
        margin-top: 4px;
      }

      .links-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        margin-top: 18px;
      }

      .icon-links {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .icon-btn {
        width: clamp(36px, 8vw, 55px);
        height: clamp(36px, 8vw, 55px);
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background:
          linear-gradient(120deg, #e6e6e6 0%, #cccccc 40%, #bbbbbb 100%),
          linear-gradient(60deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.0) 60%),
          #CCCCCC;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #222;
        text-decoration: none;
        font-size: clamp(14px, 3vw, 18px);
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
        transition: transform 0.12s, box-shadow 0.12s, background 0.12s, font-size 0.18s, width 0.18s, height 0.18s;
        position: relative;
        overflow: hidden;
      }

      .icon-btn:hover {
        transform: translateY(-1px);
        background:
          linear-gradient(120deg, #f0f0f0 0%, #dddddd 40%, #bbbbbb 100%),
          linear-gradient(60deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.0) 60%),
          #bbbbbb;
        box-shadow: 0 16px 35px rgba(0, 0, 0, 0.85);
      }

      .icon-btn:active {
        transform: translateY(0);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
      }

      .links-caption {
        font-size: 12px;
        color: #bdbdd0;
        text-align: right;
      }

      @media (max-width: 720px) {
        .primary-actions,
        .icon-links {
          justify-content: center !important;
          display: flex !important;
        }
        .links-grid {
          align-items: center !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <header class="hero-header">
          <div class="title-block">
            <h1><img src="/img/banner.png" alt="6TMT2" /></h1>
          </div>
        </header>

        <div class="hero-main">
          <div class="links-grid">
            <div class="primary-actions">
              <a href="/register" class="primary-btn primary-btn--register">點我報名</a>
              <a href="/list" class="primary-btn primary-btn--list">查看玩家名單</a>
            </div>
            <div class="icon-links">
              <a href="https://docs.google.com/spreadsheets/d/1wYdneAJZvERd8_YTcDo2jeL1gxGLLo4w-qf2AKaNCiU" class="icon-btn" aria-label="Main sheet"><img src="https://cdn-icons-png.flaticon.com/512/2991/2991116.png" alt="Google Sheet" style="width:clamp(18px,4vw,28px);height:clamp(18px,4vw,28px);object-fit:contain;transition:width 0.18s,height 0.18s;" /></a>
              <a href="https://docs.google.com/document/d/1LsvAJy8FdvUtFztAcfZZzJCpJVshkgVoo8OQXyTaFfw" class="icon-btn" aria-label="Rule document"><img src="https://cdn-icons-png.flaticon.com/512/2991/2991112.png" alt="Google Doc" style="width:clamp(18px,4vw,28px);height:clamp(18px,4vw,28px);object-fit:contain;transition:width 0.18s,height 0.18s;" /></a>
              <a href="https://discord.gg/7nyKP3ra69" class="icon-btn" aria-label="Discord"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968898.png" alt="Discord" style="width:clamp(18px,4vw,28px);height:clamp(18px,4vw,28px);object-fit:contain;transition:width 0.18s,height 0.18s;" /></a>
              <a href="https://www.twitch.tv/nickterty" class="icon-btn" aria-label="Twitch"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968952.png" alt="Twitch" style="width:clamp(18px,4vw,28px);height:clamp(18px,4vw,28px);object-fit:contain;transition:width 0.18s,height 0.18s;" /></a>
              <a href="https://www.youtube.com/@nickterty" class="icon-btn" aria-label="YouTube"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384028.png" alt="YouTube" style="width:clamp(18px,4vw,28px);height:clamp(18px,4vw,28px);object-fit:contain;transition:width 0.18s,height 0.18s;" /></a>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
