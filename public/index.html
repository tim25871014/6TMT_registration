<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6TMT2 報名頁面</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #222 0, #111 45%, #050505 100%);
        color: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: rgba(10, 10, 15, 0.92);
        border-radius: 18px;
        padding: 32px 28px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.7);
        max-width: 420px;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 26px;
      }

      p {
        margin: 4px 0 16px;
        line-height: 1.5;
        font-size: 14px;
        color: #d0d0d0;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #ff66aa, #ffcc66);
        color: #1a1a1a;
        font-weight: 600;
        font-size: 15px;
        text-decoration: none;
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.55);
        transition: transform 0.12s ease-out, box-shadow 0.12s ease-out, filter 0.12s ease-out;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
        filter: brightness(1.05);
      }

      .button:active {
        transform: translateY(0);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        filter: brightness(0.98);
      }

      .hint {
        font-size: 12px;
        color: #9a9a9a;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>6TMT2 報名</h1>
      <p>
        點擊下方按鈕後，系統會帶你前往 osu! 官方授權頁面。
        授權完成後，我們會取得你的 osu! 帳號資訊並完成報名。
      </p>
      <a class="button" href="/auth/osu">使用 osu! 帳號報名</a>
      <p class="hint">我們只會儲存你的 osu! user id 與 username，用於本比賽用途。</p>
    </main>
  </body>
  </html>
